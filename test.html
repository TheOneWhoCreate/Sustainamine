<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sustainamine Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="test.css"
    />

    <script
      type="module"
      src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js"
    ></script>
    <script
      type="module"
      src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js"
    ></script>
  </head>
  <body>
    <div class="container">
      <h1>Sustainamine Dashboard</h1>
      <p class="subtitle">Live sensor monitoring</p>

      <div class="card-grid">
        <div class="card">
          <h3>Temperature</h3>
          <p><span id="temp">--</span> °C</p>
        </div>
        <div class="card">
          <h3>Water Level</h3>
          <p><span id="level">--</span> %</p>
        </div>
        <div class="card">
          <h3>Pump Status</h3>
          <p><span id="pump_status">--</span></p>
        </div>
        <div class="card">
          <h3>Battery</h3>
          <p><span id="battery">--</span> %</p>
        </div>
        <div class="card">
          <h3>Motor Speed</h3>
          <p><span id="motor_speed">--</span> RPM</p>
        </div>
        <div class="card">
          <h3>Current</h3>
          <p><span id="current">--</span> A</p>
        </div>
      </div>

      <p class="subtitle">System Alerts</p>

      <div class="card-grid">
        <div class="card alert-card">
          <h3>Overheating</h3>
          <p id="temp_alert">Loading...</p>
        </div>
        <div class="card alert-card">
          <h3>Current Draw</h3>
          <p id="current_alert">Loading...</p>
        </div>
        <div class="card alert-card">
          <h3>Water Level</h3>
          <p id="level_alert">Loading...</p>
        </div>
      </div>
    </div>

    <script type="module">
      // Import functions from the Firebase SDK
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        onValue,
      } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

      // Your Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAhB2cC72qupLGiRls4d2gt0SOf6PKtGOY",
        authDomain: "anticheat-21e70.firebaseapp.com",
        databaseURL:
          "https://anticheat-21e70-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "anticheat-21e70",
        storageBucket: "anticheat-21e70.appspot.com",
        messagingSenderId: "984254875346",
        appId: "1:984254875346:web:6e1a4d2d10bd85836f8f0b",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Cache DOM elements for better performance
      const elements = {
        temp: document.getElementById("temp"),
        level: document.getElementById("level"),
        current: document.getElementById("current"),
        pumpStatus: document.getElementById("pump_status"),
        battery: document.getElementById("battery"),
        motorSpeed: document.getElementById("motor_speed"),
        tempAlert: document.getElementById("temp_alert"),
        currentAlert: document.getElementById("current_alert"),
        levelAlert: document.getElementById("level_alert"),
      };

      // Helper function to set alert styles and messages
      const setAlert = (element, message, alertClass) => {
        element.textContent = message;
        const card = element.parentElement;
        card.classList.remove("alert-red", "alert-orange", "alert-green");
        if (alertClass) {
          card.classList.add(alertClass);
        }
      };

      // Listen for data changes at the "/sensorData" path
      const sensorDataRef = ref(db, "/sensorData");
      onValue(
        sensorDataRef,
        (snapshot) => {
          const data = snapshot.val();
          if (data) {
            // Update UI with sensor values, using ?? '--' as a fallback
            elements.temp.textContent = data.Temp_C?.toFixed(1) ?? "--";
            elements.level.textContent = data.Water_level?.toFixed(1) ?? "--";
            elements.current.textContent = data.Current?.toFixed(1) ?? "--";
            elements.pumpStatus.textContent =
              data.Relay === true ? "On" : "Off";
            elements.battery.textContent = data.battery?.toFixed(1) ?? "--";
            elements.motorSpeed.textContent = data.Motor_speed ?? "--";

            // --- Handle Alerts ---

            // Temperature Alert
            if (data.Temp_C > 45) {
              setAlert(elements.tempAlert, "Pump Overheating!", "alert-red");
            } else {
              setAlert(elements.tempAlert, "Normal", "alert-green");
            }

            // Current Alert
            if (data.Current > 5) {
              setAlert(
                elements.currentAlert,
                "Overcurrent Detected!",
                "alert-red"
              );
            } else {
              setAlert(elements.currentAlert, "Normal", "alert-green");
            }

            // Water Level Alert (more logical thresholds)
            if (data.Water_level > 90) {
              setAlert(elements.levelAlert, "Level High!", "alert-red");
            } else if (data.Water_level >= 20 && data.Water_level <= 50) {
              setAlert(elements.levelAlert, "Level Low!", "alert-orange");
            } else {
              setAlert(elements.levelAlert, "Normal", "alert-green");
            }
          } else {
            // Handle case where there's no data
            Object.values(elements).forEach((el) => {
              if (el.id.includes("alert")) el.textContent = "No Data";
              else el.textContent = "--";
            });
          }
        },
        (error) => {
          // Handle potential errors
          console.error("Firebase read failed: ", error);
          setAlert(elements.tempAlert, "Connection Error", "alert-red");
          setAlert(elements.currentAlert, "Connection Error", "alert-red");
          setAlert(elements.levelAlert, "Connection Error", "alert-red");
        }
      );
    </script>
  </body>
</html>
